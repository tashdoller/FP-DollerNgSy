{% extends 'payroll_app/base.html' %}
{% load static %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="margin-top: 10px;">
    <div class="col-md-4">
        <div class="card shadow rounded-4">

            <div class="card-header text-dark text-center" style="background-color: #f1f1f1;">
                <h4>Update Employee</h4>
            </div>

            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" value="{{ employee.name }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ID Number</label>
                        <input type="text" value="{{ employee.id_number }}" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rate</label>
                        <input type="number" step="0.01" name="rate" value="{{ employee.rate }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Allowance (Optional)</label>
                        <input type="number" step="0.01" name="allowance" value="{{ employee.allowance }}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Overtime</label>
                        <input type="number" step="0.01" name="overtime_pay" value="{{ employee.overtime_pay }}" class="form-control">
                    </div>

                    <div class="d-flex justify-content-center gap-1 mt-3">
                        <button type="submit" class="btn btn-primary btn-sm px-3">
                            Update
                        </button>

                        <a href="{% url 'employee_list' %}" class="btn btn-secondary btn-sm px-3">
                            Back
                        </a>
                    </div>
                </form>
            </div>

            {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
            {% endif %}

        </div>
    </div>
</div>
{% endblock %}
