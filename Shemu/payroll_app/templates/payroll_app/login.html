{% extends 'payroll_app/base.html' %}
{% load static %}

{% block navbar %}
<div class="navbar-wrapper">
    <nav class="navbar navbar-dark bg-dark rounded-nav">
        <div class="container-fluid d-flex align-items-center px-4">
            <div class="d-flex align-items-center">
                <img src="{% static 'bootstrap/images/logo.png' %}" width="30" class="me-2">
                <span class="brand-text">S H E M U</span>
            </div>
        </div>
    </nav>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center vh-50">
    <div class="col-lg-7">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="row g-0">

                <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center left-panel">
                    <div class="text-center">
                        <img src="{% static 'bootstrap/images/logo.png' %}" width="120" class="mb-3">
                        <h4 class="text-white fw-bold">S H E M U</h4>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card-body p-4">

                        <div class="text-center mb-3">
                            <img src="{% static 'bootstrap/images/2logo.png' %}" width="50">
                        </div>

                        <h3 class="text-center mb-3">Welcome</h3>
                        <p class="text-center text-muted small mb-4">
                            Please enter your username and password
                        </p>

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label">Username:</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password:</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>

                            {% if form.errors %}
                                <div class="alert alert-danger text-center">
                                    Invalid login. Please try again.
                                </div>
                            {% endif %}

                            <button type="submit" class="btn btn-login w-100">
                                Sign In
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
